defaultAgent: claude

agents:
  claude:
    command: claude
    defaultArgs:
      - "--dangerously-skip-permissions"
  codex:
    command: codex
    defaultArgs:
      - "--approval-mode"
      - "never"
  pi:
    command: pi
    defaultArgs: []

stateDir: ./state
logDir: ./logs
workflowDir: ./workflows
promptDir: ./prompts
scriptDir: ./scripts

pollInterval: 10
maxConcurrency: 3

ghCommand: gh

mcpServers:
  linear:
    command: npx
    args: ["-y", "mcp-remote", "https://mcp.linear.app/mcp"]
